name: Job Profile Update

on:
  schedule:
    - cron: '0 6-21 * * *'   # every hour, 7am–9pm every day (~630 mins/month, free tier safe)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  update-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run profile update
        run: npx playwright test --project=naukri
        env:
          CI: true
          BASE_NAUKRI_URL: ${{ secrets.BASE_NAUKRI_URL }}
          NAUKRI_AUTH_STATE: ${{ secrets.NAUKRI_AUTH_STATE }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-failure-report
          path: |
            playwright-report/
            test-results/
          retention-days: 3
